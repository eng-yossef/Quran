<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> المصحف الشريف</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="quran (1).png" type="image/png" sizes="16x16">
    <!-- CSS Modules -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/main-content.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/components.css">

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3 class="sidebar-title">سور القرآن الكريم</h3>
                <button class="close-sidebar" id="closeSidebar">&times;</button>
            </div>
            <ul class="surah-list" id="surahList">
                <!-- Surah list will be populated here -->
            </ul>
        </div>
        
        <!-- Main Content  -->
        <div class="main-content">
<div class="header">
    <button class="menu-button" id="menuButton">☰</button>
    <button class="night-mode-toggle" id="nightModeToggle">🌙</button>
    <h1 class="header-title">المصحف الشريف</h1>

    <!-- Reciter Select -->
    <select id="reciterSelect" class="reciter-select">
        <option value="1">مشاري راشد العفاسي</option>
        <option value="2">أبو بكر الشاطري</option>
        <option value="3">ناصر القطامي</option>
        <option value="4">ياسر الدوسري</option>
        <option value="5">هاني الرفاعي</option>
    </select>
</div>

            
            <div class="quran-page" id="quranPage">
                <!-- Quran content will be loaded here -->
            </div>
            
            <div class="navigation">
                <button class="nav-button" id="prevPage">السابق</button>
                <span class="page-indicator" id="pageIndicator">الصفحة 1</span>
                <button class="nav-button" id="nextPage">التالي</button>
            </div>
        </div>
    </div>    
    <!-- JS Modules (loaded in dependency order) -->
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/render.js"></script>

    <script src="js/verse-interactions.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/sidebar.js"></script>

    <script src="js/image-export.js"></script>
    <script src="js/app.js"></script>
